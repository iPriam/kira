name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: "0.1.0"
  BINARY_NAME: "kira"
  PRIMARY_EXECUTABLE: "kirac"

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Keep aligned with test.yml and llvm-metadata.toml.
        include:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
            artifact_suffix: linux-x64
            archive_ext: tar.gz
          - os: macos
            arch: arm64
            runner: macos-14
            artifact_suffix: macos-arm64
            archive_ext: tar.gz
          - os: windows
            arch: x64
            runner: windows-2022
            artifact_suffix: windows-x64
            archive_ext: zip

    steps:
      - name: Check out Kira
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install native graphics headers (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxi-dev libxcursor-dev

      - name: Build Kira (Unix)
        if: matrix.os != 'windows'
        run: zig build -Doptimize=ReleaseSafe

      - name: Build Kira (Windows)
        if: matrix.os == 'windows'
        run: zig build -Doptimize=ReleaseSafe
        shell: pwsh

      - name: Package bootstrapper (Unix)
        id: package-bootstrapper
        if: matrix.os != 'windows'
        shell: bash
        run: |
          STAGE_DIR="${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}"
          mkdir -p "$STAGE_DIR"

          cp "zig-out/bin/${{ env.BINARY_NAME }}" "$STAGE_DIR/${{ env.BINARY_NAME }}"
          chmod +x "$STAGE_DIR/${{ env.BINARY_NAME }}"

          cp README.md LICENSE llvm-metadata.toml "$STAGE_DIR/"

          ARCHIVE="${STAGE_DIR}.${{ matrix.archive_ext }}"
          tar -czf "$ARCHIVE" "$STAGE_DIR"
          echo "bootstrapper_archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Package toolchain (Unix)
        id: package-toolchain
        if: matrix.os != 'windows'
        shell: bash
        run: |
          TOOLCHAIN_DIR="$HOME/.kira/toolchains/release/${{ env.VERSION }}"
          ARCHIVE="kira-toolchain-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}"
          tar -czf "$ARCHIVE" -C "$TOOLCHAIN_DIR" .
          echo "toolchain_archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Package bootstrapper (Windows)
        id: package-bootstrapper-win
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $stageDir = "${{ env.BINARY_NAME }}-${{ matrix.artifact_suffix }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          Copy-Item "zig-out\bin\${{ env.BINARY_NAME }}.exe" -Destination "$stageDir\${{ env.BINARY_NAME }}.exe"

          Copy-Item README.md, LICENSE, llvm-metadata.toml -Destination "$stageDir\"

          $archive = "$stageDir.${{ matrix.archive_ext }}"
          Compress-Archive -Path $stageDir -DestinationPath $archive
          "bootstrapper_archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append

      - name: Package toolchain (Windows)
        id: package-toolchain-win
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $toolchainDir = Join-Path $HOME ".kira\toolchains\release\${{ env.VERSION }}"
          $archive = "kira-toolchain-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}"
          Push-Location $toolchainDir
          Compress-Archive -Path "bin", "foundation", "templates", "llvm-metadata.toml" -DestinationPath (Join-Path $env:GITHUB_WORKSPACE $archive)
          Pop-Location
          "toolchain_archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8NoBOM -Append

      - name: Upload bootstrapper artifact
        uses: actions/upload-artifact@v4
        with:
          name: kira-bootstrapper-${{ matrix.artifact_suffix }}
          path: ${{ matrix.os == 'windows' && steps.package-bootstrapper-win.outputs.bootstrapper_archive || steps.package-bootstrapper.outputs.bootstrapper_archive }}
          if-no-files-found: error

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: kira-toolchain-${{ matrix.artifact_suffix }}
          path: ${{ matrix.os == 'windows' && steps.package-toolchain-win.outputs.toolchain_archive || steps.package-toolchain.outputs.toolchain_archive }}
          if-no-files-found: error

  checksum:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kira-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum -b * > SHA256SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/SHA256SUMS.txt
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build, checksum]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kira-*
          merge-multiple: true

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > /tmp/notes.md << 'RELEASE_NOTES'
          Kira v0.1.0 release

          ## Installation
          Extract the `kira-<platform>` archive for your platform, put `kira` on your PATH, and run it once to install the matching managed toolchain.
          Use `kira fetch-llvm` afterwards if you want LLVM/native and hybrid backends on that machine.

          ## What's Included
          - `kira-<platform>` - Bootstrapper launcher archive for each supported host
          - `kira-toolchain-<platform>` - Managed Kira toolchain archive downloaded automatically by the launcher
          - `SHA256SUMS.txt` - Checksums for all published assets

          ## Verification
          Verify the checksums using `sha256sum -c SHA256SUMS.txt`
          RELEASE_NOTES

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file /tmp/notes.md
            gh release upload "$TAG_NAME" artifacts/* --clobber
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file /tmp/notes.md \
              artifacts/*
          fi

      - name: Verify release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          expected=(
            kira-linux-x64.tar.gz
            kira-macos-arm64.tar.gz
            kira-windows-x64.zip
            kira-toolchain-linux-x64.tar.gz
            kira-toolchain-macos-arm64.tar.gz
            kira-toolchain-windows-x64.zip
            SHA256SUMS.txt
          )
          for asset in "${expected[@]}"; do
            if ! gh release view "$TAG_NAME" --json assets --jq '.assets[].name' | grep -qx "$asset"; then
              echo "Missing expected asset: $asset"
              exit 1
            fi
          done
          echo "All expected assets present"
