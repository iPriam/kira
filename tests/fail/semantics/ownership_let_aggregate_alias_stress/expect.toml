backends = ["hybrid", "vm", "llvm"]

# `let alias = nodes` binds an owned array to a new name. Because arrays alias on
# binding (no deep copy), this is a whole move of `nodes`; reusing `nodes` afterwards
# (passing it to the native mutator) is a use-after-move that must be rejected at `check`
# rather than aliasing into a runtime use-after-free under allocation churn.

[phases.check]
result = "fail"
diagnostic_code = "KSEM107"
diagnostic_title = "local was moved"
stage = "semantics"

[phases.build]
result = "blocked"

[phases.run]
result = "blocked"
