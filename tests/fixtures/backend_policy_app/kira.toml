[package]
name = "backend-policy-app"
version = "0.1.0"
kind = "app"
kira = "0.1.0"

[defaults]
execution_mode = "hybrid"
build_target = "host"

[execution]
default_backend = "hybrid"

[execution.hybrid]
selection = "native_except_runtime"

[execution.libraries."kira-graphics"]
backend = "llvm"
native_required = true
ffi_allowed = true

[execution.libraries."kira-graphics-sokol"]
backend = "llvm"
native_required = true
ffi_allowed = true

[execution.libraries."ui-foundation"]
backend = "hybrid"
hybrid_selection = "native_except_runtime"

[execution.web]
backend = "wasm_aot"
graphics_bridge = "webgpu"
